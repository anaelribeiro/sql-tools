<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SQL Tools</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    body {
      width: 100%;
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: #f4f7fb !important;
      color: #1f2937 !important;
      overflow: hidden;
    }

    .ise-extension {
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    .ise-extension-content {
      display: flex;
      flex-direction: column;
      flex: 1;
      min-height: 0;
      border-top: 1px solid #333333;
      background: #f4f7fb !important;
      color: #1f2937 !important;
    }

    .main {
      flex: 1;
      display: flex;
      min-height: 0;
    }

    .sidebar {
      width: 260px;
      background: white;
      border-right: 1px solid #dbe3ee;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .nav-btn {
      width: 100%;
      text-align: left;
      padding: 12px 14px;
      border: 1px solid #dbe3ee;
      border-radius: 8px;
      background: #fff;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      color: #1f2937;
    }

    .nav-btn.active {
      background: #095399;
      color: white;
      border-color: #095399;
    }

    .content {
      flex: 1;
      min-width: 0;
      min-height: 0;
      background: #eef3f9;
    }

    #toolFrame {
      width: 100%;
      height: 100%;
      border: none;
      background: white;
    }
  </style>
</head>
<body>
  <div class="ise-extension">
    <div class="ise-extension-content">
      <div class="main">
        <div class="sidebar">
          <button class="nav-btn active" data-target="sql-join-generator.html">SQL Join Generator</button>
          <button class="nav-btn" data-target="query-column-selector.html">Query Column Selector</button>
          <button class="nav-btn" data-target="sql-cat-formatter.html">SQL Formatter</button>
        </div>

        <div class="content">
          <iframe id="toolFrame" src="sql-join-generator.html"></iframe>
        </div>
      </div>
    </div>
  </div>

  <script src="index.js"></script>
</body>
</html>
